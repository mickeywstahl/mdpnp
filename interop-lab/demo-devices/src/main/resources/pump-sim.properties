# =============================================================================
# RealisticSimPump Configuration
# =============================================================================
# All latency/jitter values are in milliseconds.
# Probability values are 0.0 to 1.0.
# =============================================================================

# --- Device Identity ---------------------------------------------------------
pump.manufacturer=ICE
pump.model=Realistic Sim Pump
pump.serialNumber=SIM-001
pump.firmwareVersion=1.0.0-sim
pump.protocolVersion=1.0

# --- Status Publication ------------------------------------------------------
# How often the pump publishes its numeric status (flow rate, volume, state).
# Corresponds to MDDT attribute: ECIP communication frequency handling.
pump.statusPublicationIntervalMs=1000

# --- Command Response Latency ------------------------------------------------
# Simulates the real-world delay between the MDDT sending a command and the
# pump acknowledging it and applying the change.
# Corresponds to MDDT attribute: Communication response time.
#
# Base (mean) latency for rate-change commands, in ms.
pump.latency.rateChange.meanMs=250
# Standard deviation of latency (Gaussian jitter), in ms. Set to 0 for fixed.
pump.latency.rateChange.stdDevMs=50
# Maximum latency cap, in ms (clips the high tail of the distribution).
pump.latency.rateChange.maxMs=800

# Base latency for pause/resume commands, in ms.
pump.latency.pauseResume.meanMs=300
pump.latency.pauseResume.stdDevMs=75
pump.latency.pauseResume.maxMs=1000

# Base latency for query/status commands, in ms.
pump.latency.query.meanMs=100
pump.latency.query.stdDevMs=20
pump.latency.query.maxMs=400

# Probability that any given command experiences a latency spike
# (multiplied by pump.latency.spikeMultiplier).
pump.latency.spikeProbability=0.05
pump.latency.spikeMultiplier=5.0

# --- Heartbeat / Keep-Alive --------------------------------------------------
# Corresponds to MDDT attribute: ECIP communication health.
# How often the pump sends a keep-alive signal, in ms.
pump.heartbeat.intervalMs=5000
# Jitter on heartbeat timing, in ms.
pump.heartbeat.jitterMs=200

# --- Error / Fault Injection -------------------------------------------------
# Corresponds to MDDT attribute: ECIP error handling.

# Probability that a command response is dropped entirely (no ACK sent).
pump.error.dropResponseProbability=0.02

# Probability that a response is malformed (wrong UDI or corrupted metric).
pump.error.malformedResponseProbability=0.01

# Probability per status-publication cycle that communication is interrupted
# for pump.error.silenceDurationMs milliseconds.
pump.error.silenceProbability=0.005
pump.error.silenceDurationMs=3000

# --- Alarm Simulation --------------------------------------------------------
# Corresponds to MDDT attribute: Alarm communication.
# Each alarm type can be enabled independently.

# Occlusion alarm: fires after pump has been running for at least
# pump.alarm.occlusion.minRunTimeMs, with given probability per status cycle.
pump.alarm.occlusion.enabled=true
pump.alarm.occlusion.minRunTimeMs=30000
pump.alarm.occlusion.probabilityPerCycle=0.002
# How long the occlusion persists before auto-clearing (ms). 0 = requires reset.
pump.alarm.occlusion.durationMs=10000

# Low volume alarm: fires when simulated volume remaining drops below threshold (ml).
pump.alarm.lowVolume.enabled=true
pump.alarm.lowVolume.thresholdMl=20.0

# Line clamp alarm: fires randomly after pump has been running.
pump.alarm.lineClamp.enabled=false
pump.alarm.lineClamp.minRunTimeMs=60000
pump.alarm.lineClamp.probabilityPerCycle=0.001

# --- Infusion Parameters -----------------------------------------------------
# Initial conditions at startup.
pump.infusion.initialRateMlPerHr=5.0
pump.infusion.initialVTBIMl=100.0
# Simulated volume remaining at startup (ml). Decremented based on rate.
pump.infusion.initialVolumeMl=100.0

# Hard limits (reported to MDDT as device constraints).
pump.infusion.maxRateMlPerHr=1200.0
pump.infusion.minRateMlPerHr=0.1

# Battery simulation
pump.battery.enabled=true
# Starting battery level (0-100)
pump.battery.initialLevel=85
# Drain rate: percent per hour at max infusion rate (scales with actual rate).
pump.battery.drainRatePercentPerHour=2.0
# Level at which low-battery status is reported.
pump.battery.lowThresholdPercent=20
